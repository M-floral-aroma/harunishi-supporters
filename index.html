<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はるにしサポーターズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#F7F8FA;color:#1A1A1A;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative}
.screen{display:none}.screen.active{display:block}

/* ヘッダー */
.header{background:#fff;border-bottom:1px solid #EAEAEA;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:15px;font-weight:600;color:#1A1A1A;display:flex;align-items:center;gap:8px}
.header-icon{width:26px;height:26px;background:#E8F0FE;border-radius:50%;display:flex;align-items:center;justify-content:center}
.header-icon svg{width:14px;height:14px}

/* ラップ */
.wrap{padding:32px 20px}

/* ロゴ */
.logo{text-align:center;margin-bottom:40px}
.logo h2{font-size:26px;font-weight:700;color:#1A1A1A;letter-spacing:0.02em}
.logo p{font-size:13px;color:#888;margin-top:6px}

/* 選択ボタン */
.choice-btn{display:flex;align-items:center;gap:16px;width:100%;background:#fff;border:1.5px solid #E8E8E8;border-radius:14px;padding:18px 20px;cursor:pointer;margin-bottom:12px;text-align:left;transition:border-color 0.15s,box-shadow 0.15s}
.choice-btn:hover{border-color:#4A90D9;box-shadow:0 2px 12px rgba(74,144,217,0.15)}
.choice-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice-icon svg{width:22px;height:22px}
.choice-icon.blue{background:#E8F4FF}
.choice-icon.teal{background:#E6F9F1}
.choice-icon.purple{background:#F0EEFF}
.choice-icon.blue svg{stroke:#2C6FAC}
.choice-icon.teal svg{stroke:#1A8A5A}
.choice-icon.purple svg{stroke:#6B4DC4}
.choice-texts{flex:1}
.choice-texts p{font-size:15px;font-weight:600;color:#1A1A1A;margin-bottom:2px}
.choice-texts small{font-size:12px;color:#888}
.choice-arrow{color:#CCC}
.choice-arrow svg{width:16px;height:16px;stroke:#CCC}

/* フォーム */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#888;font-size:13px;cursor:pointer;margin-bottom:20px;padding:0}
.back-btn svg{width:16px;height:16px;stroke:#888}
.screen-title{font-size:20px;font-weight:700;margin-bottom:6px}
.screen-sub{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid #E8E8E8;border-radius:10px;padding:11px 14px;font-size:15px;background:#fff;color:#1A1A1A;transition:border-color 0.15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#4A90D9}
.form-group textarea{height:80px;resize:none}
.child-block{background:#F7F8FA;border-radius:12px;padding:14px;margin-bottom:10px}
.child-block label{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px}
.child-name{margin-bottom:10px}
.child-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.add-child-btn{background:none;border:1.5px dashed #CCC;border-radius:10px;width:100%;padding:10px;font-size:13px;color:#888;cursor:pointer;margin-top:4px;margin-bottom:16px;transition:border-color 0.15s}
.add-child-btn:hover{border-color:#4A90D9;color:#4A90D9}
.submit-btn{width:100%;background:linear-gradient(135deg,#4A90D9,#2C5F9E);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;letter-spacing:0.02em;transition:opacity 0.15s}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.err{font-size:12px;color:#E53E3E;margin-top:8px;display:none;padding:8px 12px;background:#FFF5F5;border-radius:8px}
.section-label{font-size:13px;font-weight:600;margin-bottom:8px;margin-top:4px;color:#1A1A1A}
.section-note{font-size:12px;color:#888;margin-bottom:14px;padding:10px 14px;background:#F7F8FA;border-radius:10px;line-height:1.6}

/* カレンダー */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.nav-btn{background:none;border:1.5px solid #E8E8E8;border-radius:8px;padding:6px 12px;cursor:pointer;color:#555;font-size:13px;transition:border-color 0.15s}
.nav-btn:hover{border-color:#4A90D9}
.nav-month{font-size:16px;font-weight:700}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px 12px}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:#999;padding:6px 0}
.cal-head.sun{color:#E53E3E}.cal-head.sat{color:#3182CE}
.cal-day{min-height:56px;border-radius:8px;padding:4px;cursor:pointer;transition:background 0.1s}
.cal-day:hover{background:#F0F6FF}
.cal-day.other-month .day-num{color:#CCC}
.cal-day.today .day-num{background:#4A90D9;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.day-num{font-size:12px;font-weight:600;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.sun .day-num{color:#E53E3E}.sat .day-num{color:#3182CE}
.event-pill{font-size:10px;border-radius:4px;padding:2px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500}
.event-pill.elem{background:#D4F5E0;color:#1A6B3A}
.event-pill.middle{background:#E0D9FF;color:#4A2D8C}
.event-pill.both{background:#FFF3D4;color:#7A5A00}

/* 募集一覧 */
.section-title{font-size:13px;font-weight:600;color:#888;padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #F0F0F0}
.card{background:#fff;border:1.5px solid #EAEAEA;border-radius:14px;margin:0 12px 10px;padding:16px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.card:hover{border-color:#4A90D9;box-shadow:0 2px 12px rgba(74,144,217,0.1)}
.card-title{font-size:15px;font-weight:700;margin-bottom:8px;color:#1A1A1A}
.card-meta{font-size:12px;color:#888;display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-meta svg{width:13px;height:13px;stroke:#AAA;flex-shrink:0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.tag.e1{background:#EDE9FE;color:#5B21B6}.tag.e2{background:#D1FAE5;color:#065F46}.tag.e3{background:#FEF3C7;color:#92400E}
.tag.e4{background:#FFE4E6;color:#9F1239}.tag.e5{background:#FCE7F3;color:#831843}.tag.e6{background:#DBEAFE;color:#1E40AF}
.tag.eall{background:#DCFCE7;color:#14532D}.tag.m1{background:#EDE9FE;color:#4C1D95}.tag.m2{background:#FCE7F3;color:#831843}
.tag.m3{background:#FEF9C3;color:#713F12}.tag.mall{background:#F1F5F9;color:#334155}
.card-detail{display:none;font-size:13px;color:#666;margin-bottom:12px;line-height:1.7;border-top:1px solid #F0F0F0;padding-top:10px}
.card.open .card-detail{display:block}
.card-actions{display:flex;gap:8px;align-items:center}
.join-btn{flex:1;background:#E6F9F1;color:#1A6B3A;border:1.5px solid #A7F3D0;border-radius:10px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.join-btn:hover{background:#D1FAE5}
.join-btn.joined{background:#059669;color:#fff;border-color:#059669}
.join-count{font-size:12px;color:#888;white-space:nowrap}
.detail-toggle{background:none;border:none;font-size:12px;color:#AAA;cursor:pointer;padding:0;white-space:nowrap}

/* プロフィール */
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4A90D9,#2C5F9E);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.header-btn{background:#E8F4FF;color:#2C6FAC;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.header-btn svg{width:14px;height:14px;stroke:#2C6FAC}
.profile-panel{display:none;background:#fff;border-bottom:1px solid #EAEAEA;padding:16px}
.profile-panel.open{display:block}
.logout-btn{background:none;border:1.5px solid #E8E8E8;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;color:#888;margin-top:12px;transition:border-color 0.15s}
.logout-btn:hover{border-color:#E53E3E;color:#E53E3E}
.loading-bar{text-align:center;padding:32px;font-size:13px;color:#AAA}

/* 管理者画面 */
.admin-tabs{display:flex;border-bottom:1px solid #EAEAEA;background:#fff}
.admin-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#AAA;border-bottom:2.5px solid transparent;transition:color 0.15s}
.admin-tab.active{color:#4A90D9;border-bottom-color:#4A90D9}
.admin-pane{display:none;padding:12px}.admin-pane.active{display:block}
.user-row,.admin-event-row{background:#fff;border:1.5px solid #EAEAEA;border-radius:12px;padding:14px;margin-bottom:10px}
.admin-event-title{font-size:14px;font-weight:700;margin-bottom:4px}
.admin-event-meta{font-size:12px;color:#888;margin-bottom:10px}
.admin-event-actions{display:flex;gap:8px}
.edit-btn{flex:1;background:#E8F4FF;color:#2C6FAC;border:1.5px solid #BFDBFE;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.green-btn{flex:1;background:#E6F9F1;color:#1A6B3A;border:1.5px solid #A7F3D0;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.del-btn{flex:1;background:#FFF5F5;color:#C53030;border:1.5px solid #FED7D7;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.badge{display:inline-flex;align-items:center;background:#4A90D9;color:#fff;border-radius:20px;font-size:11px;font-weight:600;padding:2px 8px;margin-left:6px}
.join-row{background:#F7F8FA;border-radius:10px;padding:10px 14px;margin-bottom:8px}

/* モーダル */
.modal-overlay{visibility:hidden;opacity:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;position:fixed;inset:0;z-index:100;transition:opacity 0.2s,visibility 0.2s}
.modal-overlay.open{visibility:visible;opacity:1}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:17px;font-weight:700}
.modal-close{background:#F0F0F0;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666}
.tag-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tag-check{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0}
.tag-check input{width:16px;height:16px;cursor:pointer}
.modal-submit{width:100%;background:linear-gradient(135deg,#4A90D9,#2C5F9E);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;transition:opacity 0.15s}
.modal-submit:disabled{opacity:0.5;cursor:not-allowed}
.modal-del{width:100%;background:none;color:#C53030;border:1.5px solid #FED7D7;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="app">

  <!-- トップ -->
  <div class="screen active" id="screen-top">
    <div class="wrap">
      <div class="logo">
        <h2>はるにしサポーターズ</h2>
        <p>晴海西小中学校 活動カレンダー</p>
      </div>
      <button class="choice-btn" onclick="showScreen('screen-login')">
        <div class="choice-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </div>
        <div class="choice-texts"><p>2回目以降の方</p><small>メールアドレスでログイン</small></div>
        <div class="choice-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
      <button class="choice-btn" onclick="showScreen('screen-reg')">
        <div class="choice-icon teal">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <div class="choice-texts"><p>新規登録</p><small>初めての方はこちら</small></div>
        <div class="choice-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
      <button class="choice-btn" onclick="showScreen('screen-admin-login')">
        <div class="choice-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="choice-texts"><p>管理者ログイン</p><small>運営スタッフ専用</small></div>
        <div class="choice-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
    </div>
  </div>

  <!-- ログイン -->
  <div class="screen" id="screen-login">
    <div class="wrap">
      <button class="back-btn" onclick="showScreen('screen-top')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        もどる
      </button>
      <p class="screen-title">ログイン</p>
      <p class="screen-sub">登録済みのメールアドレスを入力してください</p>
      <div class="form-group"><label>メールアドレス</label><input type="email" id="l-email" placeholder="example@email.com"></div>
      <div class="err" id="l-err"></div>
      <button class="submit-btn" id="l-btn" onclick="doLogin()">ログイン</button>
    </div>
  </div>

  <!-- 新規登録 -->
  <div class="screen" id="screen-reg">
    <div class="wrap">
      <button class="back-btn" onclick="showScreen('screen-top')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        もどる
      </button>
      <p class="screen-title">新規登録</p>
      <p class="screen-sub">お名前とメールアドレスを登録してください</p>
      <div class="form-group"><label>保護者のお名前</label><input type="text" id="r-name" placeholder="山田 花子"></div>
      <div class="form-group"><label>メールアドレス</label><input type="email" id="r-email" placeholder="example@email.com"></div>
      <p class="section-label">晴海西小中学校在籍のお子さまの情報<span style="font-size:11px;font-weight:400;color:#888;margin-left:6px">（最大5人）</span></p>
      <div class="section-note">お名前と生まれ年・月を登録すると、対象学年の募集が一目でわかります</div>
      <div id="children-list">
        <div class="child-block">
          <div class="child-name"><label>お子さまのお名前</label><input type="text" class="c-cname" placeholder="山田 太郎"></div>
          <div class="child-row">
            <div><label>生まれ年</label><select class="c-year"><option value="">選択</option></select></div>
            <div><label>生まれ月</label><select class="c-month"><option value="">選択</option></select></div>
          </div>
        </div>
      </div>
      <button class="add-child-btn" onclick="addChild()">＋ お子さまを追加</button>
      <div class="err" id="r-err"></div>
      <button class="submit-btn" id="r-btn" onclick="doRegister()">登録してカレンダーへ</button>
    </div>
  </div>

  <!-- 管理者ログイン -->
  <div class="screen" id="screen-admin-login">
    <div class="wrap">
      <button class="back-btn" onclick="showScreen('screen-top')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        もどる
      </button>
      <p class="screen-title">管理者ログイン</p>
      <p class="screen-sub">管理者パスワードを入力してください</p>
      <div class="form-group"><label>パスワード</label><input type="password" id="admin-pw" placeholder="パスワードを入力"></div>
      <div class="err" id="admin-err"></div>
      <button class="submit-btn" onclick="doAdminLogin()">管理者画面へ</button>
    </div>
  </div>

  <!-- カレンダー -->
  <div class="screen" id="screen-calendar">
    <div class="header">
      <h1>
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2C6FAC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        はるにしサポーターズ
      </h1>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="user-avatar" id="user-avatar" onclick="toggleProfile()">?</div>
      </div>
    </div>
    <div class="profile-panel" id="profile-panel">
      <div style="font-size:14px;font-weight:700" id="profile-name"></div>
      <div style="font-size:12px;color:#888;margin-top:3px" id="profile-email"></div>
      <div style="font-size:12px;color:#888;margin-top:6px;line-height:1.6" id="profile-children"></div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <span class="nav-month" id="nav-month"></span>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="section-title">
      <span>募集一覧</span>
      <span id="list-count" style="font-size:12px;font-weight:400;color:#AAA"></span>
    </div>
    <div id="event-list"><div class="loading-bar">読み込み中...</div></div>
    <div style="height:40px"></div>
  </div>

  <!-- 管理者画面 -->
  <div class="screen" id="screen-admin">
    <div class="header">
      <h1>
        <div class="header-icon" style="background:#F0EEFF">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6B4DC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        管理者画面
      </h1>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="header-btn" style="background:#F0EEFF;color:#6B4DC4" onclick="openPostModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6B4DC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          募集投稿
        </button>
        <button class="logout-btn" style="margin-top:0;padding:6px 12px" onclick="showScreen('screen-top')">退出</button>
      </div>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('events')">募集管理</button>
      <button class="admin-tab" onclick="switchAdminTab('users')">ユーザー</button>
      <button class="admin-tab" onclick="switchAdminTab('joins')">参加表明</button>
    </div>
    <div class="admin-pane active" id="admin-pane-events"><div id="admin-event-list"><div class="loading-bar">読み込み中...</div></div></div>
    <div class="admin-pane" id="admin-pane-users"><div id="admin-user-list"><div class="loading-bar">読み込み中...</div></div></div>
    <div class="admin-pane" id="admin-pane-joins"><div id="admin-join-list"><div class="loading-bar">読み込み中...</div></div></div>
  </div>

</div>

<!-- 募集投稿・編集モーダル -->
<div class="modal-overlay" id="post-modal-overlay" onclick="bgClose(event,'post-modal-overlay')">
  <div class="modal">
    <div class="modal-header">
      <h2 id="post-modal-title">募集を投稿</h2>
      <button class="modal-close" onclick="closeModal('post-modal-overlay')">✕</button>
    </div>
    <div class="form-group"><label>タイトル</label><input type="text" id="f-title" placeholder="例：読み聞かせボランティア"></div>
    <div class="form-group"><label>詳細</label><textarea id="f-detail" placeholder="活動内容を入力してください"></textarea></div>
    <div class="form-group"><label>実施日</label><input type="date" id="f-date"></div>
    <div class="form-group">
      <label>時間</label>
      <div class="time-row"><input type="time" id="f-start"><input type="time" id="f-end"></div>
    </div>
    <div class="form-group"><label>募集対象</label><div class="tag-grid" id="tag-grid"></div></div>
    <button class="modal-submit" id="post-btn" onclick="submitEvent()">投稿する</button>
    <button class="modal-del" id="del-btn" style="display:none" onclick="deleteEvent()">この募集を削除する</button>
  </div>
</div>

<!-- 参加者モーダル -->
<div class="modal-overlay" id="join-modal-overlay" onclick="bgClose(event,'join-modal-overlay')">
  <div class="modal">
    <div class="modal-header">
      <h2 id="join-modal-title">参加者一覧</h2>
      <button class="modal-close" onclick="closeModal('join-modal-overlay')">✕</button>
    </div>
    <div id="join-modal-list"></div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz06Jp5VWp3Pasuna7XNwkE-enkX44-e0sMpNzDkK5EKQOjyBIaF4LZVNiGrX5EHHk_/exec';
var ADMIN_PW = '20241207';
var TAG_DEFS = [
  {id:'e1',label:'小学1年',cls:'e1'},{id:'e2',label:'小学2年',cls:'e2'},{id:'e3',label:'小学3年',cls:'e3'},
  {id:'e4',label:'小学4年',cls:'e4'},{id:'e5',label:'小学5年',cls:'e5'},{id:'e6',label:'小学6年',cls:'e6'},
 {id:'m1',label:'中学1年',cls:'m1'},{id:'m2',label:'中学2年',cls:'m2'},
  {id:'m3',label:'中学3年',cls:'m3'}, {id:'eall',label:'小学校全学年',cls:'eall'},{id:'mall',label:'中学校全学年',cls:'mall'},{id:'e4',label:'地域',cls:'e4'},
];
var events = [], users = [], joins = [];
var curYear = new Date().getFullYear(), curMonth = new Date().getMonth();
var today = new Date();
var currentUser = JSON.parse(localStorage.getItem('hns_current') || 'null');
var editingEventId = null;

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

async function gasCall(action, data) {
  data = data || {};
  try {
    var body = JSON.parse(JSON.stringify(data));
    body.action = action;
    var res = await fetch(GAS_URL + '?action=' + action, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch(e) {
    return {ok: false, error: 'network'};
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function initYearMonth() {
  var curY = new Date().getFullYear();
  document.querySelectorAll('.c-year').forEach(function(s) {
    if (s.options.length > 1) return;
    for (var y = curY - 3; y >= curY - 18; y--) {
      var o = document.createElement('option'); o.value = y; o.textContent = y + '年'; s.appendChild(o);
    }
  });
  document.querySelectorAll('.c-month').forEach(function(s) {
    if (s.options.length > 1) return;
    for (var m = 1; m <= 12; m++) {
      var o = document.createElement('option'); o.value = m; o.textContent = m + '月'; s.appendChild(o);
    }
  });
}

function addChild() {
  var list = document.getElementById('children-list');
  if (list.querySelectorAll('.child-block').length >= 5) { alert('お子さまは最大5人まで登録できます'); return; }
  var block = document.createElement('div'); block.className = 'child-block';
  block.innerHTML = '<div class="child-name"><label>お子さまのお名前</label><input type="text" class="c-cname" placeholder="山田 次郎"></div><div class="child-row"><div><label>生まれ年</label><select class="c-year"><option value="">選択</option></select></div><div><label>生まれ月</label><select class="c-month"><option value="">選択</option></select></div></div>';
  list.appendChild(block); initYearMonth();
}

function calcGrade(y, m) {
  var now = new Date(); var sy = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
  var age = sy - y + (m <= 3 ? 0 : -1);
  if (age >= 6 && age <= 11) return '小学' + (age - 5) + '年';
  if (age >= 12 && age <= 14) return '中学' + (age - 11) + '年';
  if (age < 6) return '未就学'; return '卒業以上';
}

async function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var err = document.getElementById('l-err'); var btn = document.getElementById('l-btn');
  if (!email) { err.textContent = 'メールアドレスを入力してください'; err.style.display = 'block'; return; }
  err.style.display = 'none'; btn.disabled = true; btn.textContent = '確認中...';
  var res = await gasCall('login', {email: email});
  if (!res.ok) { err.textContent = res.error || 'メールアドレスが見つかりません'; err.style.display = 'block'; }
  else { currentUser = res.user; localStorage.setItem('hns_current', JSON.stringify(res.user)); enterCalendar(); }
  btn.disabled = false; btn.textContent = 'ログイン';
}

async function doRegister() {
  var name = document.getElementById('r-name').value.trim();
  var email = document.getElementById('r-email').value.trim();
  var err = document.getElementById('r-err'); var btn = document.getElementById('r-btn');
  if (!name || !email) { err.textContent = '名前とメールアドレスを入力してください'; err.style.display = 'block'; return; }
  var blocks = document.querySelectorAll('#children-list .child-block');
  var children = [];
  blocks.forEach(function(b) {
    var cname = b.querySelector('.c-cname').value.trim();
    var y = b.querySelector('.c-year').value; var m = b.querySelector('.c-month').value;
    if (cname || y || m) children.push({name: cname, year: parseInt(y) || null, month: parseInt(m) || null});
  });
  err.style.display = 'none'; btn.disabled = true; btn.textContent = '登録中...';
  var res = await gasCall('register', {name: name, email: email, children: children});
  if (!res.ok) { err.textContent = res.error || '登録に失敗しました'; err.style.display = 'block'; }
  else { currentUser = res.user; localStorage.setItem('hns_current', JSON.stringify(res.user)); enterCalendar(); }
  btn.disabled = false; btn.textContent = '登録してカレンダーへ';
}

function doAdminLogin() {
  var pw = document.getElementById('admin-pw').value;
  var err = document.getElementById('admin-err');
  if (pw !== ADMIN_PW) { err.textContent = 'パスワードが違います'; err.style.display = 'block'; return; }
  err.style.display = 'none'; enterAdmin();
}

async function enterAdmin() {
  showScreen('screen-admin');
  var results = await Promise.all([
    gasCall('getEvents'),
    gasCall('getUsers'),
    gasCall('getJoins')
  ]);
  events = results[0].ok && results[0].events ? results[0].events : [];
  users = results[1].ok && results[1].users ? results[1].users : [];
  joins = results[2].ok && results[2].joins ? results[2].joins : [];
  renderAdminEvents(); renderAdminUsers(); renderAdminJoins();
}
function switchAdminTab(tab) {
  var names = ['events', 'users', 'joins'];
  document.querySelectorAll('.admin-tab').forEach(function(t, i) { t.classList.toggle('active', names[i] === tab); });
  document.querySelectorAll('.admin-pane').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('admin-pane-' + tab).classList.add('active');
}

function tagCls(id) { var t = TAG_DEFS.find(function(t) { return t.id === id; }); return t ? t.cls : ''; }
function tagLabel(id) { var t = TAG_DEFS.find(function(t) { return t.id === id; }); return t ? t.label : id; }

function renderAdminEvents() {
  var sorted = events.slice().sort(function(a, b) { return String(a.date).localeCompare(String(b.date)); });
  if (!sorted.length) { document.getElementById('admin-event-list').innerHTML = '<div class="loading-bar">募集はまだありません</div>'; return; }
  document.getElementById('admin-event-list').innerHTML = sorted.map(function(e) {
    var dt = new Date(e.date);
    var label = (dt.getMonth()+1) + '月' + dt.getDate() + '日 ' + (e.start||'') + '〜' + (e.end||'');
    var jc = joins.filter(function(j) { return String(j.eventId) === String(e.id); }).length;
    return '<div class="admin-event-row"><div class="admin-event-title">' + e.title + '<span class="badge">' + jc + '人</span></div><div class="admin-event-meta">' + label + '</div><div class="admin-event-actions"><button class="edit-btn" onclick="openEditModal(\'' + e.id + '\')">編集</button><button class="green-btn" onclick="openJoinModal(\'' + e.id + '\')">参加者</button><button class="del-btn" onclick="deleteEventById(\'' + e.id + '\')">削除</button></div></div>';
  }).join('');
}

function renderAdminUsers() {
  if (!users.length) { document.getElementById('admin-user-list').innerHTML = '<div class="loading-bar">ユーザーはまだいません</div>'; return; }
  document.getElementById('admin-user-list').innerHTML = users.map(function(u) {
    var ch = u.children && u.children.length > 0 ? u.children.map(function(c) { return (c.name||'') + (c.year && c.month ? '（' + calcGrade(c.year, c.month) + '）' : ''); }).join('、') : 'お子さまの情報なし';
    return '<div class="user-row"><div style="font-size:14px;font-weight:700">' + u.name + '</div><div style="font-size:12px;color:#888;margin-top:3px">' + u.email + '</div><div style="font-size:12px;color:#888;margin-top:5px">' + ch + '</div></div>';
  }).join('');
}

function renderAdminJoins() {
  var byEvent = {};
  joins.forEach(function(j) { if (!byEvent[j.eventId]) byEvent[j.eventId] = {title: j.eventTitle, list: []}; byEvent[j.eventId].list.push(j); });
  var keys = Object.keys(byEvent);
  if (!keys.length) { document.getElementById('admin-join-list').innerHTML = '<div class="loading-bar">参加表明はまだありません</div>'; return; }
  document.getElementById('admin-join-list').innerHTML = keys.map(function(eid) {
    var d = byEvent[eid];
    return '<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#1A1A1A">' + d.title + '<span class="badge">' + d.list.length + '人</span></div>' + d.list.map(function(j) { return '<div class="join-row"><div style="font-size:13px;font-weight:600">' + j.userName + '</div><div style="font-size:12px;color:#888;margin-top:2px">' + j.userEmail + '</div></div>'; }).join('') + '</div>';
  }).join('');
}

async function enterCalendar() {
  showScreen('screen-calendar');
  document.getElementById('user-avatar').textContent = currentUser.name.slice(0, 1);
  document.getElementById('profile-name').textContent = currentUser.name;
  document.getElementById('profile-email').textContent = currentUser.email;
  var grades = currentUser.children && currentUser.children.length > 0
    ? currentUser.children.map(function(c) { return (c.name ? c.name + '：' : '') + (c.year && c.month ? c.year + '年' + c.month + '月生（' + calcGrade(c.year, c.month) + '）' : ''); }).filter(function(s) { return s; }).join('　')
    : 'お子さまの情報なし';
  document.getElementById('profile-children').textContent = grades;
  var results = await Promise.all([
    gasCall('getEvents'),
    gasCall('getJoins')
  ]);
  events = results[0].ok && results[0].events ? results[0].events : [];
  joins = results[1].ok && results[1].joins ? results[1].joins : [];
  renderCalendar();
}
function doLogout() { currentUser = null; localStorage.removeItem('hns_current'); document.getElementById('profile-panel').classList.remove('open'); showScreen('screen-top'); }
function toggleProfile() { document.getElementById('profile-panel').classList.toggle('open'); }

function renderCalendar() {
  var m = curMonth, y = curYear;
  document.getElementById('nav-month').textContent = y + '年' + (m+1) + '月';
  var first = new Date(y,m,1).getDay(), days = new Date(y,m+1,0).getDate(), prevDays = new Date(y,m,0).getDate();
  var sunCls = ['sun','','','','','','sat'];
  var html = ['日','月','火','水','木','金','土'].map(function(h,i){ return '<div class="cal-head ' + sunCls[i] + '">' + h + '</div>'; }).join('');
  var evMap = {};
  events.forEach(function(e){ var d = new Date(e.date); if (d.getFullYear()===y&&d.getMonth()===m){ var k=d.getDate(); if(!evMap[k])evMap[k]=[]; evMap[k].push(e); }});
  for (var i = prevDays-first+1; i <= prevDays; i++) html += '<div class="cal-day other-month"><div class="day-num">' + i + '</div></div>';
  for (var d = 1; d <= days; d++) {
    var dow = new Date(y,m,d).getDay();
    var isToday = today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var evs = evMap[d] || [];
    var fid = evs.length > 0 ? evs[0].id : '';
    var pills = evs.slice(0,2).map(function(e){
      var mid = e.tags.some(function(t){return t.startsWith('m');}), elem = e.tags.some(function(t){return t.startsWith('e');});
      var cls = (mid&&elem)?'both':(mid?'middle':(elem?'elem':''));
      return '<div class="event-pill ' + cls + '">' + e.title + '</div>';
    }).join('');
    var more = evs.length > 2 ? '<div style="font-size:10px;color:#AAA;padding:1px 2px">+' + (evs.length-2) + '</div>' : '';
    html += '<div class="cal-day ' + (isToday?'today':'') + ' ' + sunCls[dow] + '" onclick="scrollToEvent(\'' + fid + '\')"><div class="day-num">' + d + '</div>' + pills + more + '</div>';
  }
  document.getElementById('calendar').innerHTML = html;
  document.getElementById('list-count').textContent = events.length + '件';
  renderList();
}

function renderList() {
  var sorted = events.slice().sort(function(a,b){ return String(a.date).localeCompare(String(b.date)); });
  if (!sorted.length) { document.getElementById('event-list').innerHTML = '<div class="loading-bar">募集はまだありません</div>'; return; }
  document.getElementById('event-list').innerHTML = sorted.map(function(e){
    var dt = new Date(e.date);
    var label = (dt.getMonth()+1) + '月' + dt.getDate() + '日（' + ['日','月','火','水','木','金','土'][dt.getDay()] + '）';
    var tags = (e.tags||[]).map(function(t){ return '<span class="tag ' + tagCls(t) + '">' + tagLabel(t) + '</span>'; }).join('');
    var jc = joins.filter(function(j) { return String(j.eventId) === String(e.id); }).length;
    var myJoin = currentUser && joins.find(function(j){ 
  return String(j.eventId).trim()===String(e.id).trim() && String(j.userId).trim()===String(currentUser.id).trim(); 
});
    return '<div class="card" id="ev-' + e.id + '">' +
      '<div class="card-title" onclick="toggleCard(\'ev-' + e.id + '\')">' + e.title + '</div>' +
      '<div class="card-meta"><span><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + label + '</span><span><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + (e.start||'') + '〜' + (e.end||'') + '</span></div>' +
      '<div class="tags">' + tags + '</div>' +
      '<div class="card-detail">' + (e.detail||'') + '</div>' +
      '<div class="card-actions"><button class="join-btn ' + (myJoin?'joined':'') + '" onclick="toggleJoin(\'' + e.id + '\',this)">' + (myJoin?'✓ 参加予定':'参加する') + '</button><span class="join-count">' + (jc>0?jc+'人が参加予定':'') + '</span><button class="detail-toggle" onclick="toggleCard(\'ev-' + e.id + '\')">詳細▾</button></div>' +
      '</div>';
  }).join('');
}

async function toggleJoin(eventId, btn) {
  if (!currentUser) { alert('ログインしてください'); return; }
  var myJoin = joins.find(function(j){ return String(j.eventId)===String(eventId)&&String(j.userId)===String(currentUser.id); });
  
  // 先に見た目を変える
  if (myJoin) {
    btn.textContent = '参加する';
    btn.classList.remove('joined');
    joins = joins.filter(function(j){ return j.id !== myJoin.id; });
    gasCall('cancelJoin', {eventId: eventId, userId: currentUser.id});
  } else {
    btn.textContent = '✓ 参加予定';
    btn.classList.add('joined');
    var e = events.find(function(ev){ return String(ev.id)===String(eventId); });
    var tempId = 'temp_' + Date.now();
    joins.push({id:tempId,eventId:String(eventId),eventTitle:e?e.title:'',userId:String(currentUser.id),userName:currentUser.name,userEmail:currentUser.email});
    var res = await gasCall('addJoin', {eventId:eventId,eventTitle:e?e.title:'',userId:currentUser.id,userName:currentUser.name,userEmail:currentUser.email});
    if (res.ok) {
      var idx = joins.findIndex(function(j){ return j.id === tempId; });
      if (idx >= 0) joins[idx].id = res.id;
    }
  }
  renderList();
}
function toggleCard(id) { document.getElementById(id).classList.toggle('open'); }
function scrollToEvent(id) { if (!id) return; var el = document.getElementById('ev-'+id); if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('open'); }}
function changeMonth(d) { curMonth += d; if (curMonth<0){curMonth=11;curYear--;} if (curMonth>11){curMonth=0;curYear++;} renderCalendar(); }

function openPostModal() {
  editingEventId = null;
  document.getElementById('post-modal-title').textContent = '募集を投稿';
  document.getElementById('f-title').value = ''; document.getElementById('f-detail').value = '';
  document.getElementById('f-date').value = ''; document.getElementById('f-start').value = ''; document.getElementById('f-end').value = '';
  document.getElementById('post-btn').textContent = '投稿する';
  document.getElementById('del-btn').style.display = 'none';
  document.getElementById('tag-grid').innerHTML = TAG_DEFS.map(function(t){ return '<label class="tag-check"><input type="checkbox" value="' + t.id + '"><span class="tag ' + t.cls + '">' + t.label + '</span></label>'; }).join('');
  openModal('post-modal-overlay');
}

function openEditModal(id) {
  var e = events.find(function(ev){ return String(ev.id)===String(id); }); if (!e) return;
  editingEventId = id;
  document.getElementById('post-modal-title').textContent = '募集を編集';
  document.getElementById('f-title').value = e.title||''; document.getElementById('f-detail').value = e.detail||'';
  document.getElementById('f-date').value = e.date||''; document.getElementById('f-start').value = e.start||''; document.getElementById('f-end').value = e.end||'';
  document.getElementById('post-btn').textContent = '更新する';
  document.getElementById('del-btn').style.display = 'block';
  document.getElementById('tag-grid').innerHTML = TAG_DEFS.map(function(t){ return '<label class="tag-check"><input type="checkbox" value="' + t.id + '" ' + ((e.tags||[]).indexOf(t.id)>=0?'checked':'') + '><span class="tag ' + t.cls + '">' + t.label + '</span></label>'; }).join('');
  openModal('post-modal-overlay');
}

async function submitEvent() {
  var title = document.getElementById('f-title').value.trim();
  var detail = document.getElementById('f-detail').value.trim();
  var date = document.getElementById('f-date').value;
  var start = document.getElementById('f-start').value, end = document.getElementById('f-end').value;
  var tags = Array.from(document.querySelectorAll('#tag-grid input:checked')).map(function(i){ return i.value; });
  if (!title||!date) { alert('タイトルと実施日は必須です'); return; }
  var btn = document.getElementById('post-btn'); btn.disabled = true; btn.textContent = '送信中...';
  if (editingEventId) {
    var res = await gasCall('editEvent', {id:editingEventId,title:title,detail:detail,date:date,start:start,end:end,tags:tags});
    if (res.ok) { var idx = events.findIndex(function(e){ return String(e.id)===String(editingEventId); }); if (idx>=0) Object.assign(events[idx],{title:title,detail:detail,date:date,start:start,end:end,tags:tags}); }
  } else {
    var res = await gasCall('postEvent', {title:title,detail:detail,date:date,start:start,end:end,tags:tags});
    if (res.ok) events.push({id:res.id,title:title,detail:detail,date:date,start:start,end:end,tags:tags});
  }
  closeModal('post-modal-overlay'); renderAdminEvents();
  btn.disabled = false; btn.textContent = editingEventId ? '更新する' : '投稿する';
}

async function deleteEvent() {
  if (!editingEventId || !confirm('この募集を削除しますか？')) return;
  await deleteEventById(editingEventId); closeModal('post-modal-overlay');
}
async function deleteEventById(id) {
  await gasCall('deleteEvent', {id:id});
  events = events.filter(function(e){ return String(e.id)!==String(id); });
  joins = joins.filter(function(j){ return j.eventId!==String(id); });
  renderAdminEvents(); renderAdminJoins();
}

function openJoinModal(eventId) {
  var e = events.find(function(ev){ return String(ev.id)===String(eventId); });
  var list = joins.filter(function(j){ return String(j.eventId)===String(eventId); });
  document.getElementById('join-modal-title').textContent = (e?e.title:'') + 'の参加者';
  document.getElementById('join-modal-list').innerHTML = !list.length
    ? '<div class="loading-bar">参加表明はまだありません</div>'
    : list.map(function(j){ return '<div class="join-row"><div style="font-size:13px;font-weight:600">' + j.userName + '</div><div style="font-size:12px;color:#888;margin-top:2px">' + j.userEmail + '</div></div>'; }).join('');
  openModal('join-modal-overlay');
}

// 初期化
initYearMonth();
if (currentUser) { enterCalendar(); }
</script>
</body>
</html>
